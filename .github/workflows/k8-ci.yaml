name: CI - Kubernetes YAML Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix-yaml:
    name: Auto-format YAML with Prettier
    runs-on: ubuntu-latest
    outputs:
      prettier_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Prettier
        run: npm install -g prettier

      - name: Format YAML files
        run: prettier --write "**/*.yaml"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push changes if needed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "style(yaml): auto-format via CI"
          git push origin HEAD:${{ github.head_ref }}

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    needs: fix-yaml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint . --format github

  kustomize-build:
    name: Validate Kustomize build
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          mv kustomize /usr/local/bin/

      - name: Run kustomize build on cluster/
        run: kustomize build ./cluster | tee kustomized.yaml