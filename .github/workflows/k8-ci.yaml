name: CI - Kubernetes YAML Checks

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
 
jobs:
  fix-yaml:
    name: Auto-format YAML with Prettier
    runs-on: ubuntu-latest
    outputs:
      prettier_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
 
      - name: Install Prettier
        run: npm install -g prettier
 
      - name: Format YAML files
        run: prettier --write "**/*.yaml"
 
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
 
      - name: Commit & push changes if needed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "style(yaml): auto-format via CI [skip ci]"
          git push https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
 
      - name: Exit early if changes were made
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Prettier has made changes. Downstream jobs skipped — new CI run will be triggered by the auto-format commit."
          exit 0

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    needs: fix-yaml
    if: needs.fix-yaml.outputs.prettier_changed == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint . --format github

  kustomize-build:
    name: Validate Kustomize build
    runs-on: ubuntu-latest
    needs: yamllint
    if: needs.fix-yaml.outputs.prettier_changed == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          mv kustomize /usr/local/bin/

      - name: Run kustomize build on cluster/
        run: kustomize build ./cluster | tee kustomized.yaml
