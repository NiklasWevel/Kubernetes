apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lidarr-configmap-secret
  namespace: lidarr
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: lidarr-configmap-secret
    template:
      engineVersion: v2
      templateFrom:
        - configMap:
            name: lidarr-configmap
            items:
              - key: config.xml
  data:
    - secretKey: postgresUser
      remoteRef:
        key: database/lidarr
        property: db_user
    - secretKey: postgresPassword
      remoteRef:
        key: database/lidarr
        property: db_password
    - secretKey: apikey
      remoteRef:
        key: apps/lidarr
        property: apikey

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lidarr-configmap
  namespace: lidarr
data:
  config.xml: |
    <Config>
      <BindAddress>*</BindAddress>
      <Port>8686</Port>
      <SslPort>6868</SslPort>
      <EnableSsl>False</EnableSsl>
      <LaunchBrowser>True</LaunchBrowser>
      <ApiKey>{{ .apikey }}</ApiKey>
      <AuthenticationMethod>Basic</AuthenticationMethod>
      <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>
      <Branch>main</Branch>
      <LogLevel>debug</LogLevel>
      <SslCertPath></SslCertPath>
      <SslCertPassword></SslCertPassword>
      <UrlBase></UrlBase>
      <InstanceName>lidarr</InstanceName>
      <UpdateMechanism>Docker</UpdateMechanism>
      <PostgresUser>{{ .postgresUser }}</PostgresUser>
      <PostgresPassword>{{ .postgresPassword }}</PostgresPassword>
      <PostgresPort>5432</PostgresPort>
      <PostgresHost>lidarr-postgres-cluster-rw.lidarr-db.svc.cluster.local</PostgresHost>
      <PostgresMainDb>lidarr-db</PostgresMainDb>
      <PostgresLogDb>lidarr-log-db</PostgresLogDb>
    </Config>
