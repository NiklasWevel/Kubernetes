---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: lidarr
  labels:
    app: lidarr

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: lidarr
          image: ghcr.io/home-operations/lidarr:3.1.3
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: lidarr-config-secret
          env:
            - name: LIDARR__APP__INSTANCENAME
              value: lidarr
            - name: LIDARR__AUTH__METHOD
              value: Forms
            - name: LIDARR__AUTH__REQUIRED
              value: DisabledForLocalAddresses
            - name: LIDARR__LOG__LEVEL
              value: info
            - name: LIDARR__POSTGRES__HOST
              value: lidarr-postgres-cluster-rw.lidarr-db.svc.cluster.local
            - name: LIDARR__POSTGRES__PORT
              value: "5432"
            - name: LIDARR__POSTGRES__MAINDB
              value: lidarr-db
            - name: LIDARR__POSTGRES__LOGDB
              value: lidarr-log-db
          ports:
            - containerPort: 8686
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: lidarr-config
              mountPath: /config
            - name: lidarr-media-cover
              mountPath: /config/MediaCover
            - name: lidarr-media
              mountPath: /media
            - name: lidarr-seedbox
              mountPath: /downloads

      volumes:
        - name: lidarr-config
          emptyDir: {}
        - name: lidarr-media-cover
          persistentVolumeClaim:
            claimName: lidarr-pvc
        - name: lidarr-media
          persistentVolumeClaim:
            claimName: lidarr-media-pvc
        - name: lidarr-seedbox
          persistentVolumeClaim:
            claimName: lidarr-seedbox-pvc
