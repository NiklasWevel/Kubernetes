---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: lidarr
  labels:
    app: lidarr

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # Lidarr checks if it can write to config.xml on start. Copy from read-only Secret into emptyDir first.
      initContainers:
        - name: config-init
          image: busybox:1.37.0
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
          command:
            - sh
            - -c
            - cp /secret/config.xml /config/config.xml
          volumeMounts:
            - name: lidarr-configmap
              mountPath: /secret
            - name: lidarr-config
              mountPath: /config

      containers:
        - name: lidarr
          image: ghcr.io/home-operations/lidarr:3.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8686
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: lidarr-config
              mountPath: /config
            - name: lidarr-configmap
              mountPath: /config/config.xml
              subPath: config.xml
            - name: lidarr-media-cover
              mountPath: /config/MediaCover                           
            - name: lidarr-media
              mountPath: /media
            - name: lidarr-seedbox
              mountPath: /downloads

      volumes:
        - name: lidarr-config
          emptyDir: {}         
        - name: lidarr-configmap
          secret:
            secretName: lidarr-configmap-secret   
        - name: lidarr-media-cover
          persistentVolumeClaim:
            claimName: lidarr-pvc
        - name: lidarr-media
          persistentVolumeClaim:
            claimName: lidarr-media-pvc
        - name: lidarr-seedbox
          persistentVolumeClaim:
            claimName: lidarr-seedbox-pvc
