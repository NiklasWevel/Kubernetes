apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: radarr
  labels:
    app: radarr

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: radarr
          image: ghcr.io/home-operations/radarr:6.2.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: radarr-config-secret
          env:
            - name: RADARR__APP__INSTANCENAME
              value: radarr
            - name: RADARR__AUTH__METHOD
              value: Forms
            - name: RADARR__AUTH__REQUIRED
              value: DisabledForLocalAddresses
            - name: RADARR__LOG__LEVEL
              value: info
            - name: RADARR__POSTGRES__HOST
              value: radarr-postgres-cluster-rw.radarr-db.svc.cluster.local
            - name: RADARR__POSTGRES__PORT
              value: "5432"
            - name: RADARR__POSTGRES__MAINDB
              value: radarr-db
            - name: RADARR__POSTGRES__LOGDB
              value: radarr-log-db
          ports:
            - containerPort: 7878
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: radarr-media-cover
              mountPath: /config/MediaCover
            - name: radarr-media
              mountPath: /media
            - name: radarr-seedbox
              mountPath: /downloads

      volumes:
        - name: radarr-config
          emptyDir: {}
        - name: radarr-media-cover
          persistentVolumeClaim:
            claimName: radarr-pvc
        - name: radarr-media
          persistentVolumeClaim:
            claimName: radarr-media-pvc
        - name: radarr-seedbox
          persistentVolumeClaim:
            claimName: radarr-seedbox-pvc
