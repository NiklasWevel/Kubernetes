apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea-runner
  labels:
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      containers:
        - name: gitea-runner
          image: docker.wevelsiep.com/gitea/act_runner:0.3
          imagePullPolicy: IfNotPresent
          command:
            [
              "sh",
              "-c",
              "while ! nc -z localhost 2376 </dev/null; do echo 'waiting for docker daemon...'; sleep 5; done; /sbin/tini -- run.sh"
            ]
          env:
            - name: GITEA_RUNNER_NAME
              value: "Kubernetes-Runner"
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
          envFrom:
            - secretRef:
                name: gitea-runner-env-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          workingDir: /data
          volumeMounts:
            - name: gitea-runner-data
              mountPath: /data
            - name: dind-cache
              mountPath: /root/.cache/act
            - name: gitea-runner-config
              mountPath: /config
            - name: docker-certs
              mountPath: /certs
        - name: dind
          image: docker:29.3.1-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: dind-cache
              mountPath: /cache
            - name: docker-certs
              mountPath: /certs
      volumes:
        - name: gitea-runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-pvc
        - name: dind-cache
          persistentVolumeClaim:
            claimName: gitea-dind-cache-pvc
        - name: docker-certs
          emptyDir: {}
        - name: gitea-runner-config
          configMap:
            name: gitea-runner-config
