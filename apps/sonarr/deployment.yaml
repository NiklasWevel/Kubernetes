---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: sonarr
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: sonarr
          image: ghcr.io/home-operations/sonarr:4.0.17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8989
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: sonarr-configmap
              mountPath: /config/config.xml
              subPath: config.xml
            - name: sonarr-media
              mountPath: /media
            - name: sonarr-seedbox
              mountPath: /downloads
            - name: sonarr-logs
              mountPath: /config/logs
            - name: sonarr-configmap
              mountPath: /config/config.xml
              subPath: config.xml
            - name: sonarr-sentry
              mountPath: /config/Sentry
      volumes:
        - name: sonarr-config
          emptyDir: {}         
        - name: sonarr-configmap
          secret:
            secretName: sonarr-configmap-secret   
        - name: sonarr-media-cover
          persistentVolumeClaim:
            claimName: sonarr-pvc
        - name: sonarr-media
          persistentVolumeClaim:
            claimName: sonarr-media-pvc
        - name: sonarr-seedbox
          persistentVolumeClaim:
            claimName: sonarr-seedbox-pvc
        - name: sonarr-configmap
          secret:
            secretName: sonarr-configmap-secret
        - name: sonarr-logs
          emptyDir: {}
        - name: sonarr-sentry
          emptyDir: {}
