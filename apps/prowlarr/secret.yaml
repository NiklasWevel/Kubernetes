apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr-config-secret
  namespace: prowlarr
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: prowlarr-config-secret
  data:
    - secretKey: PROWLARR__POSTGRES__USER
      remoteRef:
        key: database/prowlarr
        property: db_user
    - secretKey: PROWLARR__POSTGRES__PASSWORD
      remoteRef:
        key: database/prowlarr
        property: db_password
    - secretKey: PROWLARR__AUTH__APIKEY
      remoteRef:
        key: apps/prowlarr
        property: apikey
