apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
  labels:
    app: prowlarr
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: prowlarr
          image: ghcr.io/home-operations/prowlarr:2.4.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: prowlarr-config-secret
          env:
            - name: PROWLARR__APP__INSTANCENAME
              value: prowlarr
            - name: PROWLARR__AUTH__METHOD
              value: Forms
            - name: PROWLARR__AUTH__REQUIRED
              value: DisabledForLocalAddresses
            - name: PROWLARR__LOG__LEVEL
              value: info
            - name: PROWLARR__POSTGRES__HOST
              value: prowlarr-postgres-cluster-rw.prowlarr-db.svc.cluster.local
            - name: PROWLARR__POSTGRES__PORT
              value: "5432"
            - name: PROWLARR__POSTGRES__MAINDB
              value: prowlarr-db
            - name: PROWLARR__POSTGRES__LOGDB
              value: prowlarr-log-db
          ports:
            - containerPort: 9696
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config

      volumes:
        - name: prowlarr-config
          emptyDir: {}
