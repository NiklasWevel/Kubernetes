apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
  labels:
    app: prowlarr
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: prowlarr
          image: ghcr.io/home-operations/prowlarr:2.3.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9696
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: "RuntimeDefault"
          readinessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
            - name: prowlarr-configmap
              mountPath: /config/config.xml
              subPath: config.xml
            - name: prowlarr-sentry
              mountPath: /config/Sentry

      volumes:
        - name: prowlarr-config
          emptyDir: {}
        - name: prowlarr-configmap
          secret:
            secretName: prowlarr-configmap-secret
        - name: prowlarr-logs
          emptyDir: {}
        - name: prowlarr-sentry
          emptyDir: {}
