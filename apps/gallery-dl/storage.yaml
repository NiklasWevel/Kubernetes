apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gallery-dl-pvc
  namespace: gallery-dl
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: "share"
  volumeName: gallery-dl-pv
