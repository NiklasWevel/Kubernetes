apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gallery-dl-script-secret
  namespace: gallery-dl
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kubernetes
    kind: SecretStore
  target:
    name: gallery-dl-script-secret
    template:
      engineVersion: v2
      templateFrom:
        - configMap:
            name: gallery-dl-script
            items:
              - key: gallery-dl.sh
              - key: tag.py
  data:
    - secretKey: postgresUser
      remoteRef:
        key: database/gallery-dl
        property: db_user
    - secretKey: postgresPassword
      remoteRef:
        key: database/gallery-dl
        property: db_password