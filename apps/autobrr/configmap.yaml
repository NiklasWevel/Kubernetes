apiVersion: v1
kind: ConfigMap
metadata:
  name: autobrr-config
  namespace: autobrr
data:
  config.toml: |
    host = "0.0.0.0"
    port = 7474
    baseUrlModeLegacy = true
    logLevel = "TRACE"
    checkForUpdates = true
    sessionSecret = "{{ .sessionSecret }}"
    metricsEnabled = false
    databaseType = "postgres"
    postgresHost = "autobrr-postgres-cluster-rw.autobrr-db.svc.cluster.local"
    postgresPort = 5432
    postgresDatabase = "autobrr-db"
    postgresUser = "{{ .postgresUser }}"
    postgresPass = "{{ .postgresPass }}"
    postgresSSLMode = "disable"
    postgresExtraParams = ""
