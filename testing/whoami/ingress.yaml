apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-lan
  namespace: test
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.wevelsiep.com`)
      kind: Rule
      services:
        - name: whoami
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-wan
  namespace: test
spec:
  entryPoints:
    - websecure-wan-traffic
  routes:
    - match: Host(`whoami.wevelsiep.com`)
      kind: Rule
      priority: 100
      services:
        - name: whoami
          port: 80
      middlewares:
        - name: oauth2-auth
          namespace: oauth2
