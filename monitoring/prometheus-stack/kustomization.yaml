apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - helmrepository.yaml
  - namespace.yaml
  - secret-grafana.yaml
  - secretstore.yaml

configMapGenerator:
  - name: prometheus-stack-values
    namespace: monitoring
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml
