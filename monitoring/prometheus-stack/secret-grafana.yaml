apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kubernetes
    kind: SecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: monitoring/grafana
        property: GF_SECURITY_ADMIN_USER
    - secretKey: admin-password
      remoteRef:
        key: monitoring/grafana
        property: GF_SECURITY_ADMIN_PASSWORD
