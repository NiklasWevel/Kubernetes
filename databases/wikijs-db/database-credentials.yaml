apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wikijs-password-source
  namespace: wikijs-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: wikijs-db-secret
  data:
    - secretKey: username
      remoteRef:
        key: database/wikijs
        property: db_user
    - secretKey: password
      remoteRef:
        key: database/wikijs
        property: db_password
