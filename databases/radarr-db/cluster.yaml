apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: radarr-postgres-cluster
  namespace: radarr-db
spec:
  instances: 1
  enablePDB: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    storageClass: "local-path-delete"
    size: 10Gi

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: s3-garage

  superuserSecret:
    name: postgres-superlogin

  managed:
    roles:
      - name: radarr-user
        ensure: present
        login: true
        passwordSecret:
          name: radarr-db-secret
