apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-db-secret
  namespace: forgejo-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: forgejo-db-secret
  data:
    - secretKey: username
      remoteRef:
        key: database/forgejo
        property: db_user
    - secretKey: password
      remoteRef:
        key: database/forgejo
        property: db_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-superlogin
  namespace: forgejo-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: postgres-superlogin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: database/forgejo
        property: db_root_user
    - secretKey: password
      remoteRef:
        key: database/forgejo
        property: db_root_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-s3-secret
  namespace: forgejo-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: postgres-s3-secret
    creationPolicy: Owner
  data:
    - secretKey: s3_key_id
      remoteRef:
        key: database/forgejo
        property: s3_key_id
    - secretKey: s3_secret_key
      remoteRef:
        key: database/forgejo
        property: s3_secret_key
