apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-cnpg
  namespace: seerr-db
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: seerr-postgres-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: s3-garage
  namespace: seerr-db
spec:
  configuration:
    destinationPath: s3://seerr-s3
    s3Credentials:
      accessKeyId:
        name: postgres-s3-secret
        key: s3_key_id
      secretAccessKey:
        name: postgres-s3-secret
        key: s3_secret_key
    endpointURL: https://s3.wevelsiep.com
    wal:
      compression: gzip
  retentionPolicy: "30d"
