apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-password-source
  namespace: sonarr-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: sonarr-db-secret
  data:
    - secretKey: username
      remoteRef:
        key: database/sonarr
        property: db_user
    - secretKey: password
      remoteRef:
        key: database/sonarr
        property: db_password
