apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gallery-dl-password-source
  namespace: gallery-dl-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kubernetes
    kind: SecretStore
  target:
    name: gallery-dl-db-secret
  data:
    - secretKey: username
      remoteRef:
        key: database/gallery-dl
        property: db_user
    - secretKey: password
      remoteRef:
        key: database/gallery-dl
        property: db_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-superlogin
  namespace: gallery-dl-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kubernetes
    kind: SecretStore
  target:
    name: postgres-superlogin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: database/gallery-dl
        property: db_root_user
    - secretKey: password
      remoteRef:
        key: database/gallery-dl
        property: db_root_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-s3-secret
  namespace: gallery-dl-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kubernetes
    kind: SecretStore
  target:
    name: postgres-s3-secret
    creationPolicy: Owner
  data:
    - secretKey: s3_key_id
      remoteRef:
        key: database/gallery-dl
        property: s3_key_id
    - secretKey: s3_secret_key
      remoteRef:
        key: database/gallery-dl
        property: s3_secret_key
