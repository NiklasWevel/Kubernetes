apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gallery-dl-password-source
  namespace: gallery-dl-db
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-global
    kind: ClusterSecretStore
  target:
    name: gallery-dl-db-secret
  data:
    - secretKey: username
      remoteRef:
        key: database/gallery-dl
        property: db_user
    - secretKey: password
      remoteRef:
        key: database/gallery-dl
        property: db_password
