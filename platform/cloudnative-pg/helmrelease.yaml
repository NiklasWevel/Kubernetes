apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-operator
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  releaseName: cnpg
  targetNamespace: cnpg-system
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-repo
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: plugin-barman-cloud
  targetNamespace: cnpg-system
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.7.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-repo
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    additionalArgs:
      - --log-level=debug
    resources:
      requests:
        cpu: 250m
        memory: 64Mi
      limits:
        memory: 256Mi
