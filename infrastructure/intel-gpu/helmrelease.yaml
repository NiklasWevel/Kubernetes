apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugins
spec:
  interval: 1h
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: "0.36.0"
      sourceRef:
        kind: HelmRepository
        name: intel-helm-charts
        namespace: flux-system
  install:
    createNamespace: true
  values:
    sharedDevNum: 4
