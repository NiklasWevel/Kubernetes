apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-monitoring-ingress
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s.io.cilium.k8s.namespace.labels.network-policy
        operator: In
        values:
          - strict
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
