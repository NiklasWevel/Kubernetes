apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  timeout: 20m
  chart:
    spec:
      chart: cilium
      version: "1.19.5"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  upgrade:
    remediation:
      retries: 3
  values:
    k8sServiceHost: 192.168.20.20
    k8sServicePort: 6443
    kubeProxyReplacement: true

    rollOutPods: true
    rollOutCiliumPods: true

    ipam:
      mode: "kubernetes"
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      tls:
        auto:
          enabled: true
          method: cronJob
          schedule: "0 3 1 * *"
          certValidityDuration: 1095

    externalIPs:
      enabled: true

    l2announcements:
      enabled: true

    k8sClientRateLimit:
      qps: 50
      burst: 200
