apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-repo
  namespace: longhorn-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: longhorn
      version: "v1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: flux-system
  upgrade:
    remediation:
      retries: 3
