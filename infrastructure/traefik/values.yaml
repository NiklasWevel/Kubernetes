deployment:
  kind: DaemonSet

service:
  type: LoadBalancer
  spec:
    loadBalancerIP: 192.168.20.30
    externalTrafficPolicy: Local

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    forwardedHeaders:
      insecure: true
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    forwardedHeaders:
      insecure: true
  websecure-wan-traffic:
    port: 9443
    expose:
      default: true
    exposedPort: 9443
    forwardedHeaders:
      insecure: true

additionalArguments:
  - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.websecure-wan-traffic.http.tls=true"

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.wevelsiep.com`)
    entryPoints: ["websecure"]

tlsStore:
  default:
    defaultCertificate:
      secretName: wildcard-cert

logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common

providers:
  kubernetesCRD:
    allowCrossNamespace: true
